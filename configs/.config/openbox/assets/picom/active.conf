#################################
#             Shadows           #
#################################
shadow = true;
shadow-radius = 20;
shadow-opacity = 0.75;
shadow-offset-x = -20;
shadow-offset-y = -20;

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.065;
fade-out-step = 0.065;
fade-delta = 4

#################################
#           Corners             #
#################################
corner-radius = 2

#################################
#       General Settings        #
#################################
backend = "glx"
blur-method = "dual_kawase"
blur-strength = 4
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

#################################
#           Animations          #
#################################
animations = (
  {
    # Fade and scale out when closing/hiding
    triggers = ["close", "hide"];
    opacity = {
      curve = "linear";
      duration = 0.15;
      start = "window-raw-opacity-before";
      end = 0;
    };
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.15;
      start = 1;
      end = 0.95;
    };
    scale-y = "scale-x";
    shadow-opacity = "opacity";
    blur-opacity = "opacity";
  },
  {
    # Slide up, fade in, and scale up when opening
    triggers = ["open", "show"];
    opacity = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 0;
      end = "window-raw-opacity";
    };
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 0.95;
      end = 1;
    };
    scale-y = "scale-x";
    offset-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 15;
      end = 0;
    };
    shadow-opacity = "opacity";
    blur-opacity = "opacity";
  },
  {
    # Smoothly interpolate size and position on layout shifts
    triggers = ["geometry"];
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-width-before / window-width";
      end = 1;
    };
    scale-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-height-before / window-height";
      end = 1;
    };
    offset-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-x-before - window-x";
      end = 0;
    };
    offset-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-y-before - window-y";
      end = 0;
    };
  }
);


# Rules
# See WINDOW RULES section in the man page for how these work.
rules: ({
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  match = "window_type = 'desktop' || "
          "_GTK_FRAME_EXTENTS@";
  blur-background = false;
}, {
  match = "class_g = 'Eww'";
  blur-background = false;
  shadow = false;
}, {
  match = "window_type != 'dock'";
  # shader = "my_shader.frag";
}, {
  match = "window_type = 'dock' || "
          "window_type = 'desktop'";
  corner-radius = 0;
}, {
  match = "window_type = 'dnd'                                 || "
          "window_type = 'unknown'                             || "
          "window_type = 'menu'                                || "
          "window_type = 'utility'                             || "
	  "class_g = 'Eww'                             || "
          "window_type = 'popup_menu' && class_g = \"firefox\" || "
          "window_type = 'dropdown_menu'";
  shadow = false;
}, {
  match = "name = 'plank'          || "
          "class_g = 'Conky'       || "
          "class_g = 'Cairo-clock' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
  blur-background = false;
}, {
  # dock polybar
  match = "window_type = 'dock' && class_g = \"Polybar\"";
  shadow = false;
  shadow-offset-y = -200;
  shadow-opacity = .15;
  shadow-radius = 5;
  clip-shadow-above = true;
}, {
  # dunst
  match = "class_g = 'Dunst'";
  shadow = true;
  shadow-offset-y = -200;
  shadow-opacity = .15;
  shadow-radius = 5;
  clip-shadow-above = true;
})
