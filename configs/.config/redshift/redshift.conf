[redshift]
temp-day=6500
; Dropping night temp to 2700K for that "deep red" sleep prep you asked for
temp-night=2000

; Enable fade for a smoother transition that isn't jarring
fade=0

; Manual dusk-time adjusted for your 9-10pm sleep goal.
; It will start shifting at 7:00 PM and be fully "Red" by 9:00 PM.
dawn-time=06:00-07:00
dusk-time=19:00-21:00

location-provider=manual
adjustment-method=randr

[manual]
; Chennai, India Coordinates
lat=13.08
lon=80.27

[randr]
screen=0
