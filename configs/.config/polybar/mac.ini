[bar/mainbar]
#background = #20ffffff
background = #ff151515
border-color = #ff151515
foreground = #ddc7a1
font-0 = Rubik:style=Medium:antialias=true:pixelsize=12:1
font-1 = Font Awesome 7 Free Solid:style=Regular:size=11.5;1
font-2 = symbols nerd font:size=13;1
font-3 = Schibsted Grotesk:style=Medium:antialias=true:pixelsize=11:1
height = 45
line-size = 2
modules-left = apple
modules-center = ewmh 
modules-right = batscript bat network datetime
padding = 6
module-margin = 3
border-size = 0px
enable-ipc = true

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5
reverse-scroll = false
format-volume = <label-volume>  <bar-volume>
label-volume = ’Ćź
format-muted = <label-muted>  <bar-volume>
label-muted = ’Ćź
label-muted-foreground = #666
click-right = st -e pulsemixer
bar-volume-width = 10
bar-volume-foreground-0 = #DDC7A1
bar-volume-foreground-1 = #DDC7A1
bar-volume-foreground-2 = #ff5c57
bar-volume-empty-foreground = #666666
bar-volume-gradient = false
bar-volume-indicator = 
bar-volume-fill = Ņ½ī
bar-volume-empty = Ņ½ī

[module/sep]
type = custom/text
content = "  "
#label-foreground = #555555
enable-click = true

[module/apple]
type = custom/text
content = "’ī«"
font = 1
# ’ģ╣ ’ī« 
[module/bluetooth]
type = custom/text
content = "’üé"
font = 1

[module/search]
type = custom/text
content = "’Ćé"
enable-click = true
click-left = rofi -show drun
font = 1
# ’ģ╣ ’ī« 

[module/tog]
type = custom/text
content = "’üō "

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

[module/bat]
type = internal/battery
battery = BAT1
adapter = ADP0
font = 3
format-charging =  "%{A1:$HOME/.local/scripts/sb_battery notify:}<animation-charging>%{A}"
format-discharging =  "%{A1:$HOME/.local/scripts/sb_battery notify:}<ramp-capacity>%{A}"
#format-discharging =  "%{A1:$HOME/.local/scripts/sb_battery notify:}<ramp-capacity>  <label-discharging>%{A}"
;format-charging =  "%{A1:$HOME/.local/scripts/sb_battery notify:}<animation-charging>  <label-charging>%{A}"
;format-discharging =  "%{A1:$HOME/.local/scripts/sb_battery notify:}<ramp-capacity>  <label-discharging>%{A}"
ramp-capacity-0 = "’ēä"
ramp-capacity-1 = "’ēā"
ramp-capacity-2 = "’ēé"
ramp-capacity-3 = "’ēü"
ramp-capacity-4 = "’ēĆ"
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
label-charging = %percentage%
label-discharging = %percentage%
full-at = 85
low-at = 14
label-full =  "%{A1:$HOME/.local/scripts/sb_battery notify:}’ēĆ%{A}"

[module/batscript]
type = custom/script
exec = $HOME/.local/scripts/sb_battery notify_critical
interval = 90

[module/mpd]
type = internal/mpd
host = 127.0.0.1
port = 6600
interval = 2
format-online = %{A1:pgrep ncmpcpp || st -e ncmpcpp:}<label-song>%{A}
#’Ćź’Ćü

[module/network]
type = internal/network
interface = wlan0
interval = 60
label-disconnected = ¾░żŁ
label-connected = %{A1:notify-send -i ~/pix/assets/icons/wifi-solid.svg -a scripts -r 12 "Network" "%essid%":}’ć½%{A1}
# ¾░ż©

[module/redshift]
type = custom/text
content = ’åå
click-left = redshift -O 4300
click-right = redshift -x

[module/datetime]
type = internal/date
interval = 90
date = %{A1:~/.local/scripts/datenotif:}%d %b  %H:%M%{A1}

[module/ewmh]
type = internal/xworkspaces
;label-monitor = %name%
label-active = " ’æä"
label-active-foreground = #A5AF73
label-occupied = " ’æä"
label-occupied-foreground = #555555
label-empty = " ’ōā"
label-empty-foreground = #555555
label-urgent = " ’æä"
label-urgent-foreground = #000000
label-urgent-background = #D97873
