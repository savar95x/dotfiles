#################################
#             Shadows           #
#################################
shadow = false;
shadow-radius = 4;
shadow-opacity = .25;
shadow-offset-x = -4;
shadow-offset-y = -4;

#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.065;
fade-out-step = 0.065;
fade-delta = 4

#################################
#           Corners             #
#################################
corner-radius = 4

#################################
#           Animations          #
#################################
animations = (
  {
    # Fade and scale out when closing/hiding
    triggers = ["close", "hide"];
    opacity = {
      curve = "linear";
      duration = 0.15;
      start = "window-raw-opacity-before";
      end = 0;
    };
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.15;
      start = 1;
      end = 0.95;
    };
    scale-y = "scale-x";
    shadow-opacity = "opacity";
    blur-opacity = "opacity";
  },
  {
    # Slide up, fade in, and scale up when opening
    triggers = ["open", "show"];
    opacity = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 0;
      end = "window-raw-opacity";
    };
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 0.95;
      end = 1;
    };
    scale-y = "scale-x";
    offset-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = 15;
      end = 0;
    };
    shadow-opacity = "opacity";
    blur-opacity = "opacity";
  },
  {
    # Smoothly interpolate size and position on layout shifts
    triggers = ["geometry"];
    scale-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-width-before / window-width";
      end = 1;
    };
    scale-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-height-before / window-height";
      end = 1;
    };
    offset-x = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-x-before - window-x";
      end = 0;
    };
    offset-y = {
      curve = "cubic-bezier(0.1, 1.0, 0.3, 1.0)";
      duration = 0.25;
      start = "window-y-before - window-y";
      end = 0;
    };
  }
);

# Animation settings
# Available presets: fly-in, zoom, slide-down, slide-up, slide-left, slide-right
# Available triggers: open, close, show, hide, focus-in, focus-out, activate, deactivate

#################################
#       General Settings        #
#################################
blur: {
  method = "dual_kawase";
  strength = 5;
  #background = true;
  #background-frame = false;
  #background-fixed = false;
}

backend = "glx"
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

# Rules
# See WINDOW RULES section in the man page for how these work.
rules: (
{
  match = "!focused && class_g != 'dwm' && class_g != 'Eww'";
  dim = 0.0;
  opacity = 1;
},
{
  match = "focused && class_g != 'dwm'";
  opacity = 1;
},
{
  match = "fullscreen";
  corner-radius = 0;
},
{ # monocle no corner
  match = "_NET_WM_STATE@[0]:a = '_NET_WM_STATE_MAXIMIZED_VERT'";
  corner-radius = 0;
},
{
  match = "window_type = 'tooltip'";
  fade = false;
  shadow = true;
  opacity = 0.75;
  full-shadow = false;
}, {
  match = "class_g = 'slop'";
  blur-background = false;
}, {
  match = "window_type != 'dock'";
  # shader = "my_shader.frag";
}, {
  match = "class_g = 'dmenu'";
  corner-radius = 0;
  shadow = false;
}, {
  match = "window_type = 'dock' || "
	  "class_g = 'dwm'      || "
	  "class_g = 'Dunst'    || "
	  "class_g = 'Rofi'    || "
          "window_type = 'desktop'";
  corner-radius = 0;
  shadow = false;
}, {
  match = "class_g = 'Eww'";
  corner-radius = 5;
  #blur-background = false;
  shadow = true;
}, {
match = "window_type = 'menu'        || "
          "window_type = 'dropdown_menu' || "
          "window_type = 'popup_menu'    || "
          "window_type = 'tooltip'       || "
          "window_type = 'utility'       || "
          "(class_g = 'Firefox' && !(window_type = 'normal'))";
  shadow = false;
  blur-background = false;
  corner-radius = 0;
}, {
  match = "name = 'plank'          || "
          "class_g = 'Conky'       || "
          "class_g = 'Cairo-clock' || "
          "_GTK_FRAME_EXTENTS@";
  shadow = false;
  blur = false;
}, {
  # dock polybar
  match = "window_type = 'dock' && class_g = \"polybar\"";
  shadow = true;
  shadow-offset-y = -200;
  shadow-opacity = .15;
  shadow-radius = 5;
  clip-shadow-above = true;
}, {
  # dunst
  match = "class_g = 'Dunst'";
  shadow = true;
  shadow-offset-y = -200;
  shadow-opacity = .15;
  shadow-radius = 5;
  clip-shadow-above = true;
}
)
